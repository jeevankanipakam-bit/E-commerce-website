version: 2.1

jobs:

  build-and-push:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout
      - setup_remote_docker

      - run:
          name: Install AWS CLI
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip awscliv2.zip
            sudo ./aws/install

      - run:
          name: Login to ECR Public
          command: |
            aws ecr-public get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin public.ecr.aws/m5k9b3f3

      - run:
          name: Build & Push Docker Image
          command: |
            docker build -t shopping-cart:latest .

            docker tag shopping-cart:latest \
            public.ecr.aws/m5k9b3f3/shopping-cart:latest

            docker push public.ecr.aws/m5k9b3f3/shopping-cart:latest


  terraform-infra:
    docker:
      - image: hashicorp/terraform:1.6

    steps:
      - checkout

      - run:
          name: Terraform Init + Apply (NO DUPLICATES SAFE)
          command: |
            cd terraform

            terraform init -input=false

            terraform plan -input=false

            terraform apply -auto-approve -input=false


  deploy:
    docker:
      - image: cimg/base:stable

    steps:
      - run:
          name: Install tools (SSH + AWS CLI)
          command: |
            sudo apt update
            sudo apt install -y openssh-client curl unzip

            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip awscliv2.zip
            sudo ./aws/install

      - run:
          name: Deploy to EC2 using Docker Compose
          command: |
            if [ -z "$EC2_PUBLIC_IP" ]; then
              echo "ERROR: EC2_PUBLIC_IP is not set"
              exit 1
            fi

            ssh -o StrictHostKeyChecking=no ec2-user@$EC2_PUBLIC_IP "
              set -e

              aws ecr-public get-login-password --region us-west-2 \
              | docker login --username AWS --password-stdin public.ecr.aws/m5k9b3f3

              cd /home/ec2-user/app

              docker compose pull
              docker compose down || true
              docker compose up -d --remove-orphans
            "


workflows:
  build-infra-deploy:
    jobs:
      - build-and-push
      - terraform-infra:
          requires:
            - build-and-push
      - deploy:
          requires:
            - terraform-infra
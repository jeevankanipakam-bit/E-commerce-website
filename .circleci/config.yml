version: 2.1

jobs:

  build-and-push:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout
      - setup_remote_docker

      - run:
          name: Install AWS CLI
          command: |
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip awscliv2.zip
            sudo ./aws/install

      - run:
          name: Login to ECR
          command: |
            aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/m5k9b3f3

      - run:
          name: Build & Push Image
          command: |
            docker build -t shoppingcart .

            docker tag shoppingcart:latest public.ecr.aws/m5k9b3f3/shoppingcart:latest

            docker push public.ecr.aws/m5k9b3f3/shoppingcart:latest


  terraform-infra:
    docker:
      - image: hashicorp/terraform:1.6

    steps:
      - checkout

      - run:
          name: Conditional Infra Deploy
          command: |
            cd terraform
            terraform init -input=false

            if terraform state list | grep -q "aws_instance"; then
              echo "Infra already exists → skipping creation"
            else
              echo "No infra found → creating infra"
              terraform apply -auto-approve
            fi


  deploy:
    docker:
      - image: cimg/base:stable

    steps:
      - run:
          name: Install tools
          command: |
            sudo apt update
            sudo apt install -y openssh-client curl unzip

            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip awscliv2.zip
            sudo ./aws/install

      - run:
          name: Deploy via SSH
          command: |
            ssh -o StrictHostKeyChecking=no ec2-user@$EC2_PUBLIC_IP "
              set -e

              aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/m5k9b3f3

              cd /home/ec2-user/app

              docker compose pull
              docker compose down || true
              docker compose up -d --remove-orphans
            "


workflows:
  build-infra-deploy:
    jobs:
      - build-and-push
      - terraform-infra:
          requires:
            - build-and-push
      - deploy:
          requires:
            - terraform-infra